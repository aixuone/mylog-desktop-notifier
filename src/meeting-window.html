<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Meeting Invitation</title>
<style>
@font-face {
  font-family: 'System UI';
  src: local('Microsoft YaHei UI'), local('Microsoft YaHei'),
       local('PingFang SC'), local('PingFang HK'),
       local('Noto Sans CJK SC'), local('SimHei'),
       local(system-ui), local(sans-serif);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'System UI', 'Microsoft YaHei UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: transparent;
  width: 380px; height: 320px;
  overflow: hidden; user-select: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
#app {
  width: 100%; height: 100%;
  background: rgba(255,255,255,0.92);
  /* border-radius: 12px; */
  display: flex; flex-direction: column;
  align-items: center;
  padding: 28px 24px 20px;
  position: relative; overflow: hidden;
}
.tip {
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #BA7517, #EF9F27);
}

.avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: #FEF3E4;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 500; color: #BA7517;
  margin-bottom: 12px; flex-shrink: 0; overflow: hidden;
  position: relative;
}
.avatar img {
  width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
  position: absolute; top: 0; left: 0;
}
.avatar .fallback {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%; font-size: 26px; font-weight: 600;
  color: #BA7517;
}

.meeting-icon-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 20px;
}
.meeting-icon-svg { width: 18px; height: 18px; flex-shrink: 0; }
.meeting-icon-svg svg { width: 100%; height: 100%; }
.meeting-type-label { font-size: 13px; color: #BA7517; font-weight: 500; }

.name {
  font-size: 16px; font-weight: 600; color: #2C2C2A;
  margin-bottom: 20px; max-width: 280px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.room-name {
  font-size: 13px; color: #888780;
  margin-bottom: 6px; max-width: 280px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.message {
  font-size: 13px; color: #5F5E5A; max-width: 300px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-bottom: 20px;
}

.actions {
  display: flex; gap: 16px; margin-top: auto;
}
.btn {
  border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 6px;
  transition: transform 0.15s;
  outline: none; font-family: inherit;
  background: none; padding: 0;
  font-size: 12px; color: #5F5E5A;
}
.btn:hover { transform: scale(1.05); }
.btn:active { transform: scale(0.96); }

.btn-join {
  width: 130px; height: 56px;
  border-radius: 28px;
  background: linear-gradient(135deg, rgb(82, 196, 26), rgb(16, 150, 46));
  color: white; font-size: 15px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(186,117,23,0.35);
  flex-direction: row; gap: 8px;
}
.btn-join:hover { box-shadow: 0 6px 24px rgba(82, 196, 26, 0.5); }
.btn-join .btn-icon { width: 22px; height: 22px; flex-shrink: 0; }
.btn-join .btn-icon svg { width: 100%; height: 100%; }

.btn-decline {
  width: 130px; height: 56px;
  border-radius: 28px;
  background: #F1EFE8; color: #5F5E5A;
  font-size: 15px; font-weight: 600;
  flex-direction: row; gap: 8px;
}
.btn-decline:hover { background: #E0DDD6; color: #444441; }
.btn-decline .btn-icon { width: 22px; height: 22px; flex-shrink: 0; }
.btn-decline .btn-icon svg { width: 100%; height: 100%; }

.timeout-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 5px; background: #FEF3E4;
  border-radius: 0 0 12px 12px;
}
.timeout-fill {
  height: 100%;
  background: #BA7517;
  transition: width 1s linear;
}
.btn-ignore {
  position: absolute; top: 16px; right: 20px;
  padding: 4px 14px; border-radius: 12px;
  font-size: 12px; color: #888780;
  background: #F1EFE8; border: none; cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
.btn-ignore:hover { background: #E0DDD6; color: #555552; }
</style>
</head>
<body>
<div id="app">
  <div id="tip" class="tip"></div>
  <div class="meeting-icon-row">
    <div class="meeting-icon-svg">
      <svg t="1781229417591" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="4169" width="16" height="16"><path d="M814.304 279.552c0-76.352-62.272-138.24-139.104-138.24H139.136C62.304 141.312 0 203.2 0 279.552v464.864c0 76.384 62.304 138.272 139.136 138.272H675.2c76.8 0 139.104-61.888 139.104-138.24a15.456 15.456 0 0 1 19.872-14.816l117.44 34.976A56.32 56.32 0 0 0 1024 710.656V311.136a56.32 56.32 0 0 0-72.384-53.952L832.096 292.8a13.824 13.824 0 0 1-17.792-13.248zM295.616 634.912v-241.152a56.32 56.32 0 0 1 86.432-47.552l190.4 120.544a56.32 56.32 0 0 1 0 95.136l-190.4 120.608a56.32 56.32 0 0 1-86.432-47.584z" p-id="4170"></path></svg>
    </div>
    <div class="meeting-type-label" id="room-label"></div>
  </div>

  <div class="avatar" id="avatar">
    <div class="fallback" id="avatar-fallback"></div>
  </div>
  <div class="name" id="caller-name"></div>
  
  <div class="message" id="call-message"></div>

  <div class="actions">
    <button class="btn btn-decline" id="btn-decline">
      <div class="btn-icon">
        <svg t="1781228813700" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="1664" width="56" height="56"><path d="M512 512m-512 0a512 512 0 1 0 1024 0 512 512 0 1 0-1024 0Z" fill="#E83F2B" p-id="1665"></path><path d="M269.856 580.24l96.128 2.208a29.456 29.456 0 0 0 29.92-28.912l0.48-29.408c0.288-16.64 33.376-49.2 116.24-50.56s115.264 36.704 115.008 53.312l-0.48 29.408a29.456 29.456 0 0 0 28.896 29.92l96.128 2.208a29.44 29.44 0 0 0 29.92-28.912l0.48-29.408a100.32 100.32 0 0 0-21.728-62.544 186.848 186.848 0 0 0-58.304-48.992 401.28 401.28 0 0 0-187.936-45.984 401.6 401.6 0 0 0-189.328 39.632 204.592 204.592 0 0 0-47.552 33.44 145.808 145.808 0 0 0-12.4 13.536 100.32 100.32 0 0 0-23.872 61.776l-0.496 29.408a29.456 29.456 0 0 0 28.912 29.92z" fill="#FFFFFF" p-id="1666"></path></svg>
      </div>
      <span id="btn-decline-label"></span>
    </button>
    <button class="btn btn-join" id="btn-join">
      <div class="btn-icon">
        <svg t="1781231836256" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="6025" width="56" height="56"><path d="M91.903539 43.98543C178.637175-42.66288 225.907647 12.457561 304.791312 91.341227c94.540943 94.583606 118.176179 139.251641 47.270472 210.200011-107.766436 105.078674-65.700836 239.125444 34.130304 338.956584 99.873803 99.83114 233.87791 139.294304 338.999247 34.130305 68.345934-68.260609 115.616406-47.270471 210.242674 47.355797 73.550806 76.195904 131.401671 123.509039 44.668036 210.200011-157.682006 157.682006-520.316489 110.368871-759.441933-128.756573-239.125444-236.523009-286.438579-601.759927-128.756573-759.399269zM853.435953 85.325761c31.39988 0 56.869619 25.46974 56.86962 56.869619v227.563804C910.305573 401.159064 884.835833 426.628803 853.435953 426.628803h-284.433423A56.869619 56.869619 0 0 1 512.132911 369.759184V142.19538C512.132911 110.7955 537.60265 85.325761 569.00253 85.325761H853.435953z m168.219738 89.080094A28.456141 28.456141 0 0 1 1024.087475 186.010158v140.019574a28.456141 28.456141 0 0 1-39.975119 25.981694L938.761714 331.831883V180.122681l45.350642-20.13688c14.334728-6.399432 31.143903 0.085326 37.543335 14.420054z" p-id="6026" fill="#e6e6e6"></path></svg>
      </div>
      <span id="btn-join-label"></span>
    </button>
  </div>
  <button class="btn-ignore" id="btn-ignore">忽略</button>
  <div class="timeout-bar">
    <div class="timeout-fill" id="timeout-fill" style="width:100%"></div>
  </div>
</div>

<!-- Hidden audio element for ringtone -->
<audio id="ringtone-audio" style="display:none;"></audio>

<script>
var LABELS = {
  meeting: '多人会议',
  join: '加入会议',
  decline: '拒绝',
  unknown: '未知用户',
  inviting: '邀请你参加会议',
};

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btn-join-label').textContent = LABELS.join;
  document.getElementById('btn-decline-label').textContent = LABELS.decline;
  document.getElementById('caller-name').textContent = LABELS.unknown;
  document.getElementById('call-message').textContent = LABELS.inviting;

  if (!window.electronAPI) {
    document.body.innerHTML = '<div style="color:red;padding:20px;font-family:sans-serif;">Error: electronAPI not available</div>';
    return;
  }

  var callData = {};
  var timeoutTimer = null;
  var elapsed = 0;
  var TIMEOUT = 59;
  var ringtoneConfig = {};
  var ringtoneReady = false;      // true once canplaythrough has fired

  // Fixed audio element from HTML
  var audioElement = document.getElementById('ringtone-audio');

  function getAPI() { return window.electronAPI; }

  // ── Preload: called on page load, NOT on call arrival ──
  window.electronAPI.onPreloadRingtone(function(data) {
    if (!data || !data.ringtonePath) return;
    ringtoneConfig = data.ringtoneConfig || {};
    console.log('[Ringtone] Preloading:', data.ringtonePath);

    // Configure audio element
    audioElement.loop = ringtoneConfig.loop !== undefined ? ringtoneConfig.loop : true;
    audioElement.volume = ringtoneConfig.volume !== undefined ? ringtoneConfig.volume : 0.7;
    audioElement.src = data.ringtonePath;
    audioElement.preload = 'auto';
    audioElement.crossOrigin = 'anonymous';

    audioElement.addEventListener('canplaythrough', function() {
      ringtoneReady = true;
      console.log('[Ringtone] Preload complete, ready to play instantly');
    }, { once: true });
    audioElement.load();
  });

  function startRingtone(ringtonePath, config) {
    ringtoneConfig = config || {};

    // Fast path: ringtone already preloaded and decoded — just hit play()
    if (ringtoneReady && ringtonePath === audioElement.src) {
      console.log('[Ringtone] Playing preloaded ringtone (instant)');
      audioElement.currentTime = ringtoneConfig.startTime || 0;
      audioElement.play().then(function() {
        console.log('[Ringtone] Preloaded playback started');
      }).catch(function(err) {
        console.warn('[Ringtone] Preloaded play failed, fallback:', err.name);
        // Fallback: reload and play
        ringtoneReady = false;
        startRingtone(ringtonePath, config);
      });
      return;
    }

    // Slow path: no preload or different ringtone
    if (!ringtonePath) {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') ctx.resume();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.3);
        osc.frequency.setValueAtTime(880, ctx.currentTime + 0.6);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.0);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 1.0);
      } catch(e) { console.warn('[Ringtone] Oscillator fallback failed:', e); }
      return;
    }

    // Configure and load audio
    audioElement.loop = ringtoneConfig.loop !== undefined ? ringtoneConfig.loop : true;
    audioElement.volume = ringtoneConfig.volume !== undefined ? ringtoneConfig.volume : 0.7;
    audioElement.src = ringtonePath;
    audioElement.preload = 'auto';
    audioElement.crossOrigin = 'anonymous';

    audioElement.addEventListener('canplaythrough', function() {
      audioElement.currentTime = ringtoneConfig.startTime || 0;
      audioElement.play().then(function() {
        console.log('[Ringtone] Playing from position:', audioElement.currentTime);
      }).catch(function(err) {
        console.warn('[Ringtone] Play rejected:', err.name, err.message);
        setTimeout(function() {
          audioElement.currentTime = ringtoneConfig.startTime || 0;
          audioElement.play().catch(function(e) { console.warn('[Ringtone] Retry failed:', e); });
        }, 100);
      });
    }, { once: true });

    audioElement.load();

    setTimeout(function() {
      if (audioElement.readyState >= 2) {
        audioElement.currentTime = ringtoneConfig.startTime || 0;
        audioElement.play().catch(function() {});
      }
    }, 100);
  }

  function stopRingtone() {
    try {
      audioElement.pause();
      audioElement.currentTime = 0;
      audioElement.src = '';        // Release the audio resource
      audioElement.load();          // Fully reset the audio element
    } catch(e) { console.warn('[Ringtone] Stop error:', e); }
    // Reset preload state so next preload-ringtone can re-decode
    ringtoneReady = false;
    console.log('[Ringtone] Stopped');
  }
  // Expose globally so main process can call via executeJavaScript
  window.__stopRingtone = stopRingtone;

  window.electronAPI.onMeetingData(function(data) {
    callData = data;
    ringtoneConfig = data.ringtoneConfig || {};
    TIMEOUT = Math.floor((data.ringtoneConfig?.timeout || 45000) / 1000);
    render(data);
    startTimeout();
    startRingtone(data.ringtonePath, data.ringtoneConfig);
  });

  window.electronAPI.onStopRingtone(function() {
    stopRingtone();
  });

  // Safety net: stop ringtone when page is hidden, unloaded, or navigated away
  window.addEventListener('beforeunload', stopRingtone);
  window.addEventListener('pagehide', stopRingtone);
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) stopRingtone();
  });

  function render(data) {
    var avatarEl = document.getElementById('avatar');
    var fallbackEl = document.getElementById('avatar-fallback');
    var prevImg = avatarEl.querySelector('img');
    if (prevImg) prevImg.remove();

    var name = data.callerName || LABELS.unknown;
    var avatarUrl = data.callerAvatar || '';

    if (avatarUrl) {
      var img = document.createElement('img');
      img.src = avatarUrl;
      img.alt = '';
      img.onerror = function() { this.style.display = 'none'; fallbackEl.style.display = 'flex'; };
      img.onload = function() { fallbackEl.style.display = 'none'; };
      avatarEl.insertBefore(img, fallbackEl);
      fallbackEl.style.display = '';
    } else {
      fallbackEl.style.display = 'flex';
    }
    fallbackEl.textContent = name.charAt(0);

    document.getElementById('caller-name').textContent = name;

    var roomMsg = data.message || '';
    document.getElementById('room-label').textContent = roomMsg;

    document.getElementById('call-message').textContent = LABELS.inviting;
  }

  function startTimeout() {
    if (timeoutTimer) clearInterval(timeoutTimer);
    elapsed = 0;
    var fill = document.getElementById('timeout-fill');
    fill.style.width = '100%';
    timeoutTimer = setInterval(function() {
      elapsed++;
      var pct = 100 - (elapsed / TIMEOUT) * 100;
      fill.style.width = Math.max(0, pct) + '%';
      if (elapsed >= TIMEOUT) {
        clearInterval(timeoutTimer);
        stopRingtone();
        var api = getAPI();
        if (api) api.sendMeetingAction('timeout');
      }
    }, 1000);
  }

  function doAction(action) {
    clearInterval(timeoutTimer);
    stopRingtone();
    var api = getAPI();
    if (api) api.sendMeetingAction(action);
  }

  document.getElementById('btn-ignore').addEventListener('click', function() { doAction('ignore'); });
  document.getElementById('btn-join').addEventListener('click', function() { doAction('accept'); });
  document.getElementById('btn-decline').addEventListener('click', function() { doAction('reject'); });
});
</script>
</body>
</html>
