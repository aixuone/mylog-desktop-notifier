name: Build Cross-Platform

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # Allow manual trigger from Actions page

env:
  GITEE_OWNER: aixuone
  GITEE_REPO: mylog-desktop-notifier

jobs:
  # ── Windows build ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: MyLogNotifier-Windows
          path: dist-installer-new/*.exe
          if-no-files-found: error

      # ── Upload to Gitee Release ──
      - name: Upload to Gitee Release (Windows)
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG="v$(date +%Y%m%d-%H%M%S)-win"
          echo "Creating Gitee release: $TAG"

          # Create release
          RELEASE_RESP=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_OWNER }}/${{ env.GITEE_REPO }}/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG}\",
              \"name\": \"MyLog Notifier ${TAG}\",
              \"body\": \"Auto-built from GitHub Actions (Windows)\\nCommit: ${{ github.sha }}\",
              \"target_commitish\": \"main\",
              \"prerelease\": false
            }")

          RELEASE_ID=$(echo "$RELEASE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null)
          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: Failed to create release"
            echo "$RELEASE_RESP"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"

          # Upload each .exe file
          for file in dist-installer-new/*.exe; do
            if [ -f "$file" ]; then
              echo "Uploading: $(basename $file)"
              curl -s -X POST \
                "https://gitee.com/api/v5/repos/${{ env.GITEE_OWNER }}/${{ env.GITEE_REPO }}/releases/${RELEASE_ID}/attach_files" \
                -H "Content-Type: multipart/form-data" \
                -F "access_token=${GITEE_TOKEN}" \
                -F "file=@${file}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('  OK:', d.get('name','?'))" 2>/dev/null || echo "  Upload may have failed"
            fi
          done

          echo "✅ Windows artifacts uploaded to Gitee Release: $TAG"

  # ── macOS build (signed + notarized) ───────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── Install Apple certificate ──
      - name: Install Apple certificate
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          # Decode p12 from base64
          echo "$MAC_CERTS" | base64 --decode > certificate.p12

          # Create keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate into keychain
          security import certificate.p12 \
            -P "$MAC_CERTS_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Clean up
          rm -f certificate.p12

      # ── Build + sign + notarize ──
      - run: npm ci
      - run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Notarize the app ──
      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Find the .app bundle inside dist
          APP_PATH=$(find dist-installer-new/mac-arm64 -name "*.app" -maxdepth 1 2>/dev/null || find dist-installer-new/mac -name "*.app" -maxdepth 1 2>/dev/null || find dist-installer-new -name "*.app" -maxdepth 2 | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "⚠️ No .app bundle found, skipping notarization"
            exit 0
          fi

          echo "Notarizing: $APP_PATH"

          # Create zip for notarization
          ditto -c -k --keepParent "$APP_PATH" app.zip

          # Submit for notarization
          xcrun notarytool submit app.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 10m

          # Staple the ticket
          xcrun stapler staple "$APP_PATH"

          echo "✅ Notarization complete"

          # Clean up zip
          rm -f app.zip

      # ── Rebuild DMG with notarized app ──
      - name: Rebuild DMG with notarized app
        run: |
          # electron-builder already created the DMG before notarization
          # We need to recreate it with the now-notarized .app
          npx electron-builder --mac --config.compression=store
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: MyLogNotifier-macOS
          path: dist-installer-new/*.dmg
          if-no-files-found: warn

      # ── Upload to Gitee Release ──
      - name: Upload to Gitee Release (macOS)
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG="v$(date +%Y%m%d-%H%M%S)-mac"
          echo "Creating Gitee release: $TAG"

          # Create release
          RELEASE_RESP=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_OWNER }}/${{ env.GITEE_REPO }}/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG}\",
              \"name\": \"MyLog Notifier ${TAG}\",
              \"body\": \"Auto-built from GitHub Actions (macOS, signed & notarized)\\nCommit: ${{ github.sha }}\",
              \"target_commitish\": \"main\",
              \"prerelease\": false
            }")

          RELEASE_ID=$(echo "$RELEASE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null)
          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: Failed to create release"
            echo "$RELEASE_RESP"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"

          # Upload each .dmg file
          for file in dist-installer-new/*.dmg; do
            if [ -f "$file" ]; then
              echo "Uploading: $(basename $file)"
              curl -s -X POST \
                "https://gitee.com/api/v5/repos/${{ env.GITEE_OWNER }}/${{ env.GITEE_REPO }}/releases/${RELEASE_ID}/attach_files" \
                -H "Content-Type: multipart/form-data" \
                -F "access_token=${GITEE_TOKEN}" \
                -F "file=@${file}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('  OK:', d.get('name','?'))" 2>/dev/null || echo "  Upload may have failed"
            fi
          done

          echo "✅ macOS artifacts uploaded to Gitee Release: $TAG"
